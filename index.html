<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freedom Date | Expense Coverage Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --freedom: #059669;
            --bg: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header { text-align: center; padding: 30px 0; }
        .header h1 { font-size: 2.2rem; margin-bottom: 5px; color: #0f172a; }
        .header p { color: #64748b; margin: 0; }

        .dashboard { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; font-size: 1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; color: #475569; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: var(--primary); background: #f8fafc; }

        .result-box { text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; background: #f8fafc; border-radius: 12px; padding: 20px; }
        .freedom-stat { font-size: 3.5rem; font-weight: 800; color: var(--freedom); line-height: 1; }
        .stat-sub { color: #64748b; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .ledger-container { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .scroll-area { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; text-align: left; padding: 15px; font-size: 0.75rem; color: #64748b; border-bottom: 2px solid #f1f5f9; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        
        .freedom-row { background-color: #f0fdf4 !important; font-weight: 600; }
        .freedom-badge { background: var(--freedom); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: 800; }
        .highlight-text { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Financial Freedom Calculator</h1>
        <p>Map your journey from active labor to passive independence.</p>
    </div>

    <div class="dashboard">
        <!-- INPUTS -->
        <div class="card">
            <h3>Wealth Parameters</h3>
            <div class="input-grid">
                <div class="input-group">
                    <label>Starting Balance ($)</label>
                    <input type="number" id="startBalance" value="10000" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>Current Age</label>
                    <input type="number" id="age" value="25" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>Monthly Contribution ($)</label>
                    <input type="number" id="monthlyAdd" value="1000" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>Monthly Expenses ($)</label>
                    <input type="number" id="expenses" value="3500" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>Portfolio Return (%)</label>
                    <input type="number" id="returnRate" value="8" step="0.1" oninput="calculate()">
                </div>
                <div class="input-group">
                    <label>Inflation Rate (%)</label>
                    <input type="number" id="inflation" value="3" step="0.1" oninput="calculate()">
                </div>
            </div>
        </div>

        <!-- SUMMARY -->
        <div class="card">
            <div class="result-box">
                <span class="stat-sub">Freedom Age</span>
                <div id="freedomAge" class="freedom-stat">--</div>
                <div id="freedomSummary" class="stat-sub" style="margin-top: 15px; color: #475569; text-transform: none; font-weight: 400;">
                    Complete the inputs to calculate your crossover point.
                </div>
            </div>
        </div>
    </div>

    <div class="ledger-container">
        <table>
            <thead>
                <tr>
                    <th>Age</th>
                    <th>Portfolio Balance</th>
                    <th>Expenses (Inflation Adj)</th>
                    <th>Safe Monthly Draw (4%)</th>
                    <th>Status</th>
                </tr>
            </thead>
        </table>
        <div class="scroll-area">
            <table>
                <tbody id="ledgerBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const startBalance = parseFloat(document.getElementById('startBalance').value) || 0;
        const currentExpenses = parseFloat(document.getElementById('expenses').value) || 0;
        const age = parseInt(document.getElementById('age').value) || 0;
        const monthlyAdd = parseFloat(document.getElementById('monthlyAdd').value) || 0;
        const returnRate = (parseFloat(document.getElementById('returnRate').value) / 100) / 12;
        const inflationRate = (parseFloat(document.getElementById('inflation').value) / 100) / 12;

        let balance = startBalance;
        let freedomFound = false;
        let ledgerHtml = '';

        // Simulate 75 years (up to age 100 max)
        for (let m = 0; m <= 75 * 12; m++) {
            const currentMonthAge = age + (m / 12);
            const adjMonthlyExpense = currentExpenses * Math.pow(1 + inflationRate, m);
            const safeMonthlyDraw = (balance * 0.04) / 12;

            // Log yearly progress
            if (m % 12 === 0 && m > 0) {
                const isFree = safeMonthlyDraw >= adjMonthlyExpense;
                
                if (isFree && !freedomFound) {
                    freedomFound = true;
                    const inflationMultiplier = (adjMonthlyExpense / currentExpenses).toFixed(1);
                    document.getElementById('freedomAge').textContent = Math.floor(currentMonthAge);
                    document.getElementById('freedomSummary').innerHTML = 
                        `At age ${Math.floor(currentMonthAge)}, your cost of living will have grown <span class="highlight-text">${inflationMultiplier}x</span> due to inflation. Your portfolio will safely cover it.`;
                }

                ledgerHtml += `<tr class="${isFree ? 'freedom-row' : ''}">
                    <td style="width:15%">Age ${Math.floor(currentMonthAge)}</td>
                    <td style="width:25%">$${Math.round(balance).toLocaleString()}</td>
                    <td style="width:25%">$${Math.round(adjMonthlyExpense).toLocaleString()}</td>
                    <td style="width:20%">$${Math.round(safeMonthlyDraw).toLocaleString()}</td>
                    <td>${isFree ? '<span class="freedom-badge">INDEPENDENT</span>' : '<span style="color:#94a3b8">Saving...</span>'}</td>
                </tr>`;
            }

            // Compound monthly
            balance = (balance + monthlyAdd) * (1 + returnRate);
        }

        if (!freedomFound) {
            document.getElementById('freedomAge').textContent = "75+";
            document.getElementById('freedomSummary').textContent = "At current rates, freedom occurs after age 75. Try increasing contributions or reducing expenses.";
        }

        document.getElementById('ledgerBody').innerHTML = ledgerHtml;
    }

    // Run on load
    calculate();
</script>

</body>
</html>
