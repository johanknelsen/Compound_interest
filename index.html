<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Freedom Date | Expense Coverage Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --freedom: #059669;
            --warning: #dc2626;
            --bg: #f1f5f9;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header { text-align: center; padding: 40px 0; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #0f172a; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--primary); }

        .result-box { text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .freedom-stat { font-size: 3rem; font-weight: 800; color: var(--freedom); line-height: 1; }
        .stat-sub { color: #64748b; font-size: 0.9rem; margin-top: 10px; }

        .ledger-container { background: white; border-radius: 16px; overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; text-align: left; padding: 15px; font-size: 0.8rem; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .freedom-row { background-color: #ecfdf5 !important; font-weight: 700; }
        .freedom-badge { background: var(--freedom); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Your Freedom Date</h1>
        <p>When will your investments cover your life, adjusted for inflation?</p>
    </div>

    <div class="dashboard">
        <!-- INPUTS -->
        <div class="card">
            <h3>Wealth & Lifestyle</h3>
            <div class="input-group">
                <label>Current Monthly Expenses ($)</label>
                <input type="number" id="expenses" value="4000" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Current Age</label>
                <input type="number" id="age" value="28" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Monthly Contribution ($)</label>
                <input type="number" id="monthlyAdd" value="1500" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Portfolio Return (%)</label>
                <input type="number" id="returnRate" value="8" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>Est. Inflation (%)</label>
                <input type="number" id="inflation" value="3" oninput="calculate()">
            </div>
        </div>

        <!-- SUMMARY -->
        <div class="card">
            <div class="result-box">
                <span class="stat-sub">Estimated Freedom Age</span>
                <div id="freedomAge" class="freedom-stat">--</div>
                <div id="freedomSummary" class="stat-sub" style="margin-top: 20px; padding: 0 20px;">
                    Enter your data to find your crossover point.
                </div>
            </div>
        </div>
    </div>

    <div class="ledger-container">
        <table>
            <thead>
                <tr>
                    <th>Age</th>
                    <th>Portfolio Balance</th>
                    <th>Monthly Expense (Inf. Adj)</th>
                    <th>4% Safe Draw/Mo</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>
</div>

<script>
    function calculate() {
        const currentExpenses = parseFloat(document.getElementById('expenses').value);
        const age = parseInt(document.getElementById('age').value);
        const monthlyAdd = parseFloat(document.getElementById('monthlyAdd').value);
        const returnRate = parseFloat(document.getElementById('returnRate').value) / 100 / 12;
        const inflationRate = parseFloat(document.getElementById('inflation').value) / 100 / 12;

        let balance = 0;
        let freedomFound = false;
        let ledgerHtml = '';

        // Run simulation up to age 100
        for (let m = 0; m <= (100 - age) * 12; m++) {
            const currentMonthAge = age + (m / 12);
            const adjMonthlyExpense = currentExpenses * Math.pow(1 + inflationRate, m);
            const safeMonthlyDraw = (balance * 0.04) / 12;

            // Log yearly progress
            if (m % 12 === 0) {
                const isFree = safeMonthlyDraw >= adjMonthlyExpense;
                if (isFree && !freedomFound) {
                    freedomFound = true;
                    document.getElementById('freedomAge').textContent = Math.floor(currentMonthAge);
                    document.getElementById('freedomSummary').innerHTML = `At age ${Math.floor(currentMonthAge)}, your portfolio will generate <strong>$${Math.round(safeMonthlyDraw).toLocaleString()}</strong>/mo, covering your inflation-adjusted cost of living.`;
                }

                ledgerHtml += `<tr class="${isFree ? 'freedom-row' : ''}">
                    <td>Age ${Math.floor(currentMonthAge)}</td>
                    <td>$${Math.round(balance).toLocaleString()}</td>
                    <td>$${Math.round(adjMonthlyExpense).toLocaleString()}</td>
                    <td>$${Math.round(safeMonthlyDraw).toLocaleString()}</td>
                    <td>${isFree ? '<span class="freedom-badge">FREE</span>' : '<small>Compounding...</small>'}</td>
                </tr>`;
            }

            // Update balance for next month
            balance = (balance + monthlyAdd) * (1 + returnRate);
        }

        if (!freedomFound) {
            document.getElementById('freedomAge').textContent = "70+";
            document.getElementById('freedomSummary').textContent = "Based on current rates, your freedom date is beyond age 70. Consider increasing contributions or return expectations.";
        }

        document.getElementById('ledgerBody').innerHTML = ledgerHtml;
    }

    // Initialize
    calculate();
</script>

</body>
</html>
